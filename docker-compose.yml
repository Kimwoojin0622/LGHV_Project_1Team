services:
  backend:
    build: ./BACKEND/backend/
    ports:
      - "8000:8000"
    env_file:
      - ./BACKEND/backend/.env.aws
    depends_on:
      - db

  frontend:
    build: ./FRONTEND/frontend
    ports:
    - "3001:3000"
    environment:
    - ./FRONTEND\frontend\.env.local
    depends_on:
    - backend


  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crm
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
